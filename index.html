<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Generator — Elektro Novateh</title>
  <meta name="description" content="Generator QR kod in izkaznic za Elektro Novateh." />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: #e2e8f0;
      background:
        radial-gradient(50rem 36rem at 15% -10%, rgba(59,130,246,0.18), transparent 60%),
        radial-gradient(46rem 32rem at 100% 0%, rgba(251,146,60,0.12), transparent 55%),
        #080d1e;
    }
    .wrap { width: 100%; max-width: 720px; text-align: center; }
    .badge {
      display: inline-block; margin-bottom: 16px; padding: 6px 14px;
      border-radius: 999px; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.5px;
      color: #93c5fd; background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3);
    }
    h1 { font-size: clamp(1.8rem, 5vw, 2.6rem); margin: 0 0 10px; }
    h1 span { background: linear-gradient(90deg,#60a5fa,#fb923c); -webkit-background-clip: text; background-clip: text; color: transparent; }
    p.lead { color: #94a3b8; margin: 0 0 32px; line-height: 1.6; }
    .cards { display: grid; gap: 16px; grid-template-columns: 1fr 1fr; }
    @media (max-width: 560px) { .cards { grid-template-columns: 1fr; } }
    a.card {
      display: block; text-decoration: none; text-align: left; padding: 24px;
      border-radius: 18px; color: inherit;
      background: linear-gradient(160deg, rgba(16,24,46,0.9), rgba(12,18,38,0.9));
      border: 1px solid rgba(120,150,205,0.2);
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
    }
    a.card:hover { transform: translateY(-4px); border-color: rgba(96,165,250,0.6); box-shadow: 0 18px 40px rgba(8,12,24,0.5); }
    .card .icon { font-size: 2rem; }
    .card h2 { margin: 12px 0 6px; font-size: 1.15rem; }
    .card small { color: #94a3b8; }
    footer { margin-top: 30px; color: #64748b; font-size: 0.8rem; }
  </style>
</head>
<body>
  <main class="wrap">
    <span class="badge">⚡ ELEKTRO NOVATEH</span>
    <h1><span>QR Orodja</span></h1>
    <p class="lead">Generator QR kod in izkaznic za podjetje Elektro Novateh.</p>
    <div class="cards">
      <a class="card" href="qr-generator.html">
        <div class="icon">🔳</div>
        <h2>QR Generator</h2>
        <small>Ustvari in prenesi QR kodo.</small>
      </a>
      <a class="card" href="izkaznice.html">
        <div class="icon">🪪</div>
        <h2>Izkaznice</h2>
        <small>Generiraj izkaznice z QR kodami.</small>
      </a>
    </div>
    <footer>© <span id="year"></span> Elektro Novateh</footer>
  </main>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
